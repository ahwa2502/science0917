<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SCIENCE CORE</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Orbitron","Pretendard",sans-serif;
}

body{
    background:
    radial-gradient(circle at center,#06213b 0%,#020611 45%,#000 100%);
    height:100vh;
    overflow:hidden;
    color:#00eaff;
}


/* 별빛 배경 */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background-image:
    radial-gradient(#00eaff 1px,transparent 1px);
    background-size:60px 60px;
    opacity:.25;
    animation:space 20s linear infinite;
}

@keyframes space{
    from{transform:translateY(0);}
    to{transform:translateY(60px);}
}


/* 시작 화면 */

#start{

height:100vh;

display:flex;
align-items:center;
justify-content:space-between;

padding:0 140px;

}


/* 문구 */

.quote{

font-size:42px;

line-height:1.5;

letter-spacing:2px;

text-shadow:
0 0 10px #00eaff,
0 0 30px #008cff;

}


/* 버튼 */

button{

background:transparent;

border:2px solid #00eaff;

color:#00eaff;

padding:22px 55px;

font-size:28px;

cursor:pointer;

box-shadow:
0 0 15px #00eaff,
inset 0 0 15px #00eaff;

transition:.3s;

}


button:hover{

background:#00eaff;

color:#00121f;

box-shadow:
0 0 40px #00eaff;

}


/* 부팅 화면 */

#boot{

display:none;

height:100vh;

align-items:center;

justify-content:center;

flex-direction:column;

font-size:35px;

text-shadow:
0 0 20px cyan;

}


/* 게임 화면 */

#game{

display:none;

height:100vh;

align-items:center;

justify-content:center;

flex-direction:column;

}


.title{

font-size:50px;

margin-bottom:35px;

animation:blink 1s infinite;

}


@keyframes blink{

50%{
opacity:.4;
}

}



.hud{

width:650px;

padding:40px;

border:2px solid #00eaff;

background:rgba(0,20,50,.65);

box-shadow:

0 0 30px #00eaff,

inset 0 0 25px #00eaff;

}


.hud h2{

font-size:35px;

margin-bottom:25px;

}


.info{

font-size:22px;

line-height:2;

}


.bar{

height:18px;

border:1px solid #00eaff;

margin:20px 0;

}


.progress{

height:100%;

width:100%;

background:#00eaff;

box-shadow:0 0 20px cyan;

}



.unlock{

margin-top:25px;

color:#8fffff;

font-size:21px;

}


</style>

</head>


<body>


<div id="start">


<div class="quote">

우주는 질문하는 자에게<br>
비밀을 공개한다.

</div>


<button onclick="startSystem()">

START SYSTEM

</button>


</div>




<div id="boot">

<div>
SYSTEM BOOTING...
</div>

<br>

<div id="count">

0%

</div>

</div>





<div id="game">


<div class="title">

SCIENCE CORE ONLINE

</div>


<div class="hud">


<h2>
SCIENCE MISSION
</h2>


<div class="info">

PLAYER : STUDENT<br>

GRADE : MIDDLE SCHOOL 2<br><br>


CURRENT UNIT<br>

▶ 과학 중2 1단원

</div>



<div class="bar">

<div class="progress"></div>

</div>


<div class="info">

MISSION COMPLETE<br>

DATA : 100%

</div>



<div class="unlock">

NEXT AREA UNLOCK<br><br>

01 물질의 구성<br>

02 전기와 자기<br>

03 태양계와 별<br>

04 화학 반응

</div>



</div>

</div>





<script>


function sound(){

let ctx=new AudioContext();

let osc=ctx.createOscillator();

let gain=ctx.createGain();


osc.type="sawtooth";

osc.frequency.setValueAtTime(100,ctx.currentTime);

osc.frequency.exponentialRampToValueAtTime(
25,
ctx.currentTime+2
);


gain.gain.setValueAtTime(
0.2,
ctx.currentTime
);


gain.gain.exponentialRampToValueAtTime(
0.001,
ctx.currentTime+2
);


osc.connect(gain);

gain.connect(ctx.destination);


osc.start();

osc.stop(ctx.currentTime+2);

}




function startSystem(){


sound();


document.getElementById("start").style.display="none";


let boot=document.getElementById("boot");

boot.style.display="flex";


let count=document.getElementById("count");


let n=0;


let timer=setInterval(()=>{


n+=10;

count.innerHTML=n+"%";


if(n>=100){

clearInterval(timer);


setTimeout(()=>{


boot.style.display="none";

document.getElementById("game").style.display="flex";


},700);


}


},150);


}


</script>


</body>
</html>
