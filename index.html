<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 홈페이지</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: "맑은 고딕", Arial, sans-serif;
            background: linear-gradient(135deg,#74b9ff,#a29bfe);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            width:90%;
            max-width:650px;
            background:white;
            border-radius:20px;
            padding:40px;
            text-align:center;
            box-shadow:0 15px 35px rgba(0,0,0,0.2);
        }

        .emoji{
            font-size:60px;
            margin-bottom:20px;
        }

        h1{
            color:#2d3436;
            margin-bottom:15px;
        }

        h2{
            color:#0984e3;
            margin-bottom:25px;
        }

        p{
            font-size:20px;
            line-height:1.8;
            color:#555;
            margin-bottom:15px;
        }

        .footer{
            margin-top:30px;
            padding-top:20px;
            border-top:1px solid #ddd;
            color:#888;
            font-size:15px;
        }

        .btn{
            display:inline-block;
            margin-top:25px;
            padding:12px 30px;
            background:#0984e3;
            color:white;
            text-decoration:none;
            border-radius:30px;
            font-weight:bold;
            transition:0.3s;
        }

        .btn:hover{
            background:#0652dd;
            transform:scale(1.05);
        }
    </style>
</head>

<body>

<div class="card">

    <div class="emoji">🌟</div>

    <h1>나만의 홈페이지</h1>

    <h2>아화중학교 김수현 학생입니다.</h2>

    <p>
        안녕하세요!<br><br>
        과학시간에 만든 <strong>나만의 홈페이지 주소입니다.</strong>
    </p>

    <p>
        다음시간부터 <strong>이쁘게 꾸밀거에요.</strong> 😊
    </p>

    <a href="#" class="btn">방문해 주셔서 감사합니다!</a>

    <div class="footer">
        © 2025 My First Homepage
    </div>

</div>

</body>
</html>
