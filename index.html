<!DOCTYPE html> <html lang="ko"> <head> <meta charset="UTF-8"> <title>SCIENCE UNIVERSE</title> <style> *{ margin:0; padding:0; box-sizing:border-box; } body{ overflow:hidden; height:100vh; background:#020313; color:white; font-family:Arial, sans-serif; } /* 우주 배경 */ .space{ position:absolute; width:100%; height:100%; background: radial-gradient(circle at 50% 50%, #123b8a 0%, #05051c 35%, #000 80%); overflow:hidden; } /* 성운 */ .nebula{ position:absolute; width:900px; height:900px; left:50%; top:50%; transform:translate(-50%,-50%); background: radial-gradient(circle, rgba(0,220,255,.25), transparent 60%); filter:blur(50px); animation:pulse 5s infinite; } @keyframes pulse{ 50%{ transform:translate(-50%,-50%) scale(1.3); } } /* 별 */ .star{ position:absolute; width:3px; height:3px; background:white; border-radius:50%; box-shadow: 0 0 10px white; animation:move 8s linear infinite; } @keyframes move{ from{ transform:translateY(0); } to{ transform:translateY(110vh); } } /* 행성 */ .planet{ position:absolute; right:12%; top:18%; width:260px; height:260px; border-radius:50%; background: radial-gradient(circle at 30% 30%, #9ff, #256, #020313); box-shadow: 0 0 80px #00eaff; } /* 문구 */ .title{ position:absolute; left:70px; top:35%; font-size:55px; font-weight:bold; color:#cfffff; text-shadow: 0 0 10px #00eaff, 0 0 40px #008cff, 0 0 80px #0055ff; letter-spacing:5px; } /* 버튼 */ button{ position:absolute; left:65%; top:45%; width:300px; height:110px; font-size:40px; color:#00eaff; background:transparent; border:3px solid #00eaff; box-shadow: 0 0 30px #00eaff, inset 0 0 20px #00eaff; cursor:pointer; } button:hover{ background:#00eaff; color:black; } /* 워프 */ .warp{ animation:warp 2s forwards; } @keyframes warp{ 100%{ transform:scale(8); filter:brightness(3); } } /* 게임창 */ .panel{ display:none; position:absolute; width:500px; left:50%; top:50%; transform:translate(-50%,-50%); padding:40px; background: rgba(0,20,50,.85); border:2px solid #00eaff; box-shadow: 0 0 50px #00eaff; } .panel h1{ text-align:center; color:#00eaff; } .item{ margin:15px 0; padding:15px; border:1px solid #00eaff; } </style> </head> <body> <div class="space"> <div class="nebula"></div> <div class="planet"></div> </div> <div class="title"> 미래는<br> 작은 것에서<br> 시작된다 </div> <button onclick="start()"> START </button> <div class="panel" id="panel"> <h1> SCIENCE DATABASE </h1> <div class="item"> 01. 물질의 구성 </div> <div class="item"> 02. 전기와 자기 </div> <div class="item"> 03. 태양계와 별 </div> <div class="item"> 04. 식물과 에너지 </div> <div class="item"> 05. 생물의 다양성 </div> </div> <script> // 별 자동 생성 for(let i=0;i<150;i++){ let s=document.createElement("div"); s.className="star"; s.style.left=Math.random()*100+"%"; s.style.top=Math.random()*100+"%"; s.style.animationDelay= Math.random()*5+"s"; document.querySelector(".space") .appendChild(s); } function start(){ document.body.classList.add("warp"); setTimeout(()=>{ document.querySelector("button") .style.display="none"; document.querySelector(".title") .style.display="none"; document.querySelector(".panel") .style.display="block"; document.body.classList.remove("warp"); },2000); } </script> </body> </html>
