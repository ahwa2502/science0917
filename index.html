<!DOCTYPE html> <html lang="ko"> <head> <meta charset="UTF-8"> <title>SCIENCE SYSTEM</title> <style> @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap'); *{ margin:0; padding:0; box-sizing:border-box; } body{ height:100vh; overflow:hidden; color:white; font-family:'Orbitron', sans-serif; background: linear-gradient( 90deg, rgba(0,0,20,.75), rgba(0,0,20,.25), rgba(0,0,0,.65) ), url("background.jpg") center/cover no-repeat; } /* 왼쪽 문구 */ .title{ position:absolute; left:70px; top:28%; font-size:55px; font-weight:900; line-height:1.35; color:#d9f8ff; text-shadow: 0 0 10px #00eaff, 0 0 40px #008cff; animation:flicker 3s infinite; } .small{ font-size:18px; letter-spacing:5px; color:#00eaff; } /* 시작 버튼 */ .start{ position:absolute; top:45%; left:60%; width:300px; height:120px; background:rgba(0,0,0,.35); border:3px solid #00eaff; color:#00eaff; font-size:40px; font-weight:bold; cursor:pointer; box-shadow: 0 0 20px #00eaff, inset 0 0 20px #00eaff; transition:.3s; } .start:hover{ background:#00eaff; color:black; transform:scale(1.1); } /* 시스템 화면 */ .system{ display:none; position:absolute; width:100%; height:100%; background: rgba(0,0,20,.92); justify-content:center; align-items:center; } .box{ width:600px; padding:40px; border:2px solid #00eaff; box-shadow: 0 0 40px #00eaff; background: rgba(0,10,30,.8); } h1{ text-align:center; color:#00eaff; margin-bottom:30px; } .lesson{ padding:15px; margin:12px 0; border:1px solid #0077aa; cursor:pointer; transition:.2s; } .lesson:hover{ background:#00eaff; color:black; box-shadow:0 0 20px #00eaff; } @keyframes flicker{ 0%,100%{opacity:1;} 50%{opacity:.75;} } </style> </head> <body> <div class="title"> <div class="small"> SCIENCE // UNKNOWN SYSTEM </div> 미래는<br> 작은 것에서<br> 시작된다 </div> <button class="start" onclick="startGame()"> START </button> <div class="system" id="system"> <div class="box"> <h1> SCIENCE DATABASE </h1> <div class="lesson"> 01. 물질의 구성 </div> <div class="lesson"> 02. 전기와 자기 </div> <div class="lesson"> 03. 태양계와 별 </div> <div class="lesson"> 04. 식물과 에너지 </div> <div class="lesson"> 05. 생물의 다양성 </div> </div> </div> <script> function sound(){ let audio = new AudioContext(); let osc = audio.createOscillator(); let gain = audio.createGain(); osc.frequency.value=80; gain.gain.value=.15; osc.connect(gain); gain.connect(audio.destination); osc.start(); setTimeout(()=>{ osc.frequency.value=300; },800); setTimeout(()=>{ gain.gain.exponentialRampToValueAtTime( 0.001, audio.currentTime+2 ); },2000); } function startGame(){ sound(); document.body.style.filter= "brightness(0)"; setTimeout(()=>{ document.querySelector(".title").style.display="none"; document.querySelector(".start").style.display="none"; document.getElementById("system") .style.display="flex"; document.body.style.filter="brightness(1)"; },1800); } </script> </body> </html>
