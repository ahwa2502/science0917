<!DOCTYPE html> <html lang="ko"> <head> <meta charset="UTF-8"> <title>SCIENCE UNIVERSE</title> <style> *{ margin:0; padding:0; box-sizing:border-box; } body{ overflow:hidden; height:100vh; background: radial-gradient(circle at center, #102b55, #020313 55%, #000 100%); color:white; font-family:Arial,sans-serif; } /* 우주 성운 */ .nebula{ position:absolute; width:100%; height:100%; background: radial-gradient( circle at 70% 40%, rgba(0,170,255,.25), transparent 35% ), radial-gradient( circle at 30% 70%, rgba(80,0,255,.2), transparent 40% ); animation:spaceMove 12s infinite alternate; } @keyframes spaceMove{ from{ transform:scale(1); } to{ transform:scale(1.15); } } /* 지구 */ .earth{ position:absolute; right:12%; top:25%; width:280px; height:280px; border-radius:50%; background: radial-gradient( circle at 35% 30%, #bff, #1b8cff 35%, #06336e 70%, #020313 ); box-shadow: 0 0 40px #00eaff, 0 0 100px #0066ff; } /* 별자리 */ .constellation{ position:absolute; right:28%; top:15%; width:350px; height:250px; transition:2s; } /* 별 */ .star{ position:absolute; width:8px; height:8px; background:white; border-radius:50%; box-shadow: 0 0 15px white, 0 0 40px #00eaff; } /* 북극성 */ .polaris{ width:18px; height:18px; box-shadow: 0 0 30px white, 0 0 80px #00eaff; } /* 별자리 선 */ .line{ position:absolute; height:2px; background:#00eaff; opacity:.5; transform-origin:left center; } /* 문구 */ .title{ position:absolute; left:70px; top:35%; font-size:55px; font-weight:bold; line-height:1.4; letter-spacing:5px; color:#dfffff; text-shadow: 0 0 15px #00eaff, 0 0 50px #0077ff; } /* 시작 버튼 */ button{ position:absolute; left:65%; top:55%; width:280px; height:100px; font-size:40px; color:#00eaff; background:transparent; border: 3px solid #00eaff; box-shadow: 0 0 30px #00eaff, inset 0 0 20px #00eaff; cursor:pointer; } button:hover{ background:#00eaff; color:#000; } /* 워프 */ .warp{ animation: warp 3s forwards; } @keyframes warp{ 100%{ transform:scale(10); filter:brightness(3); } } /* 게임창 */ .panel{ display:none; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:550px; padding:40px; background: rgba(0,15,40,.85); border: 2px solid #00eaff; box-shadow: 0 0 50px #00eaff; } .panel h1{ text-align:center; color:#00eaff; margin-bottom:30px; } .item{ padding:15px; margin:12px 0; border:1px solid #00eaff; } </style> </head> <body> <div class="nebula"></div> <div class="earth"></div> <div class="constellation" id="stars"> <span class="star polaris" style="left:80px;top:20px"> </span> <span class="star" style="left:180px;top:80px"> </span> <span class="star" style="left:250px;top:160px"> </span> <span class="star" style="left:90px;top:150px"> </span> <div class="line" style="left:85px;top:30px;width:130px;transform:rotate(25deg)"> </div> <div class="line" style="left:190px;top:90px;width:110px;transform:rotate(40deg)"> </div> </div> <div class="title"> 미래는<br> 작은 것에서<br> 시작된다 </div> <button onclick="startGame()"> START </button> <div class="panel" id="panel"> <h1> SCIENCE DATABASE </h1> <div class="item"> 01. 물질의 구성 </div> <div class="item"> 02. 전기와 자기 </div> <div class="item"> 03. 태양계와 별 </div> <div class="item"> 04. 식물과 에너지 </div> <div class="item"> 05. 생물의 다양성 </div> </div> <script> function startGame(){ document.querySelector(".nebula") .classList.add("warp"); document.querySelector(".earth") .classList.add("warp"); document.querySelector("#stars") .classList.add("warp"); document.querySelector("button") .style.display="none"; document.querySelector(".title") .style.opacity="0"; setTimeout(()=>{ document.querySelector("#panel") .style.display="block"; },3000); } </script> </body>
