<!DOCTYPE html> <html lang="ko"> <head> <meta charset="UTF-8"> <title>SCIENCE ODYSSEY</title> <style> *{ margin:0; padding:0; box-sizing:border-box; } body{ overflow:hidden; height:100vh; background:#000; font-family:"Arial",sans-serif; color:white; } /* ================= 우주 ================= */ .space{ position:absolute; width:100%; height:100%; background: radial-gradient(circle at 70% 40%, rgba(30,120,255,.25), transparent 35%), radial-gradient(circle at 30% 80%, rgba(130,0,255,.2), transparent 45%), linear-gradient( #02051c, #000 ); transition:3s; } /* 성운 움직임 */ .nebula{ position:absolute; width:120%; height:120%; left:-10%; top:-10%; background: radial-gradient( ellipse, rgba(0,200,255,.12), transparent 55% ); filter:blur(60px); animation: nebulaMove 15s infinite alternate; } @keyframes nebulaMove{ from{ transform:scale(1); } to{ transform:scale(1.3); } } /* ================= 지구 ================= */ .earth{ position:absolute; right:13%; top:25%; width:260px; height:260px; border-radius:50%; background: radial-gradient( circle at 35% 30%, #8fdfff 0 5%, transparent 6% ), radial-gradient( ellipse at 45% 45%, #3f9148 0 13%, transparent 14% ), radial-gradient( ellipse at 65% 60%, #4d8c38 0 15%, transparent 16% ), radial-gradient( circle, #1688d8, #06457d 70%, #001020 ); box-shadow: inset -50px -40px 80px #00152f, 0 0 50px #1ad8ff, 0 0 120px #0066ff; animation: float 8s infinite alternate; } @keyframes float{ to{ transform:translateY(-15px); } } /* ================= 별자리 ================= */ .constellation{ position:absolute; left:18%; top:18%; } .star{ position:absolute; width:7px; height:7px; background:white; border-radius:50%; box-shadow: 0 0 15px white, 0 0 30px #00eaff; } /* 북극성 */ .polaris{ width:16px; height:16px; box-shadow: 0 0 30px white, 0 0 80px #00eaff; } /* 별자리 선 */ .line{ position:absolute; height:2px; background:#55ddff; opacity:.5; } /* ================= 문구 ================= */ .title{ position:absolute; left:70px; top:55%; font-size:55px; line-height:1.3; font-weight:bold; letter-spacing:5px; color:#dfffff; text-shadow: 0 0 15px #00eaff, 0 0 50px #0088ff; } /* ================= START ================= */ button{ position:absolute; right:18%; bottom:25%; width:280px; height:100px; font-size:42px; color:#00eaff; background:rgba(0,0,0,.2); border: 3px solid #00eaff; box-shadow: 0 0 30px #00eaff, inset 0 0 20px #00eaff; cursor:pointer; } button:hover{ background:#00eaff; color:black; } /* ================= 워프 ================= */ .warp{ animation: spaceWarp 3s forwards; } @keyframes spaceWarp{ 0%{ transform:scale(1); } 60%{ filter: brightness(2); } 100%{ transform: scale(12); filter: brightness(3) blur(5px); } } /* 데이터 창 */ .panel{ display:none; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:600px; padding:40px; background: rgba(0,15,35,.9); border: 2px solid #00eaff; box-shadow: 0 0 60px #00eaff; } .panel h1{ color:#00eaff; text-align:center; margin-bottom:30px; } .item{ padding:15px; margin:12px 0; border:1px solid #00eaff; } </style> </head> <body> <div class="space" id="space"> <div class="nebula"></div> </div> <div class="earth"></div> <!-- 북극성 --> <div class="constellation"> <div class="star polaris" style="left:150px;top:20px"></div> <div class="star" style="left:100px;top:100px"></div> <div class="star" style="left:40px;top:150px"></div> <div class="line" style=" left:110px; top:90px; width:80px; transform:rotate(-45deg)"> </div> </div> <div class="title"> 미래는<br> 작은 것에서<br> 시작된다 </div> <button onclick="startGame()"> START </button> <div class="panel" id="panel"> <h1> SCIENCE DATABASE </h1> <div class="item"> 01. 물질의 구성 </div> <div class="item"> 02. 전기와 자기 </div> <div class="item"> 03. 태양계와 별 </div> <div class="item"> 04. 식물과 에너지 </div> <div class="item"> 05. 생물의 다양성 </div> </div> <script> function startGame(){ document .getElementById("space") .classList.add("warp"); document .querySelector(".earth") .classList.add("warp"); document .querySelector(".constellation") .classList.add("warp"); document .querySelector("button") .style.display="none"; document .querySelector(".title") .style.opacity=0; setTimeout(()=>{ document .getElementById("panel") .style.display="block"; },3000); } </script> </body> </html>
