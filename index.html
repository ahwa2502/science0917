<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Science Game</title>

<style>
body{
    margin:0;
    background:#000814;
    color:#00d9ff;
    font-family:Consolas,monospace;
    overflow:hidden;
}

#start{
    position:absolute;
    top:45%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:42px;
    color:#fff;
    cursor:pointer;
    text-shadow:0 0 10px #00eaff,0 0 30px #00eaff;
}

#subtitle{
    position:absolute;
    top:53%;
    left:50%;
    transform:translateX(-50%);
    color:#8ef6ff;
}

#panel{
    display:none;
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:700px;
    background:rgba(0,20,40,.9);
    border:2px solid #00eaff;
    padding:25px;
    box-shadow:0 0 30px #00eaff;
}

.glitch{
    animation:glitch .15s 4;
}

@keyframes glitch{
    0%{transform:translate(2px,-2px);}
    25%{transform:translate(-2px,2px);}
    50%{transform:translate(3px,1px);}
    75%{transform:translate(-3px,-1px);}
    100%{transform:translate(0,0);}
}

#loading{
    margin-top:15px;
}

.bar{
    width:100%;
    height:20px;
    background:#111;
}

.fill{
    height:100%;
    width:0%;
    background:#00d9ff;
}

#line{
    margin-top:20px;
    white-space:pre-line;
}
</style>
</head>

<body>

<div id="start">START</div>
<div id="subtitle">System Online</div>

<div id="panel">

<h2>SYSTEM ONLINE</h2>

<div>학년 : 중학교 2학년</div>
<div>과목 : 과학</div>

<br>

<div>학습 데이터 로딩...</div>

<div class="bar">
<div class="fill"></div>
</div>

<div id="loading">0%</div>

<div id="line"></div>

</div>

<audio id="hum" src="hum.mp3"></audio>
<audio id="noise" src="glitch.mp3"></audio>

<script>

const units=[
"01. 물질의 구성",
"02. 전기와 자기",
"03. 태양계",
"04. 식물과 에너지",
"05. 동물과 에너지",
"06. 소화·순환·호흡·배설",
"07. 힘과 운동",
"08. 열과 우리 생활",
"",
"MISSION READY"
];

document.getElementById("start").onclick=function(){

document.getElementById("hum").play();

this.style.display="none";
subtitle.style.display="none";

setTimeout(()=>{

document.getElementById("hum").volume=.2;

},1500);

setTimeout(()=>{

document.getElementById("noise").play();

document.body.classList.add("glitch");

document.getElementById("panel").style.display="block";

loading();

},2200);

};

function loading(){

let p=0;

let bar=document.querySelector(".fill");

let txt=document.getElementById("loading");

let t=setInterval(()=>{

p+=2;

bar.style.width=p+"%";

txt.innerHTML=p+"%";

if(p>=100){

clearInterval(t);

showUnits();

}

},40);

}

function showUnits(){

let i=0;

let area=document.getElementById("line");

let t=setInterval(()=>{

area.innerHTML+=units[i]+"<br>";

i++;

if(i==units.length){

clearInterval(t);

}

},450);

}

</script>

</body>
</html>
