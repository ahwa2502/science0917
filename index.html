<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Science Game</title>

<style>
body{
    margin:0;
    background:#000814;
    color:#00eaff;
    font-family:Arial, sans-serif;
    overflow:hidden;
}

/* 시작 화면 */
#start{
    height:100vh;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 120px;
}

/* 문구 */
.text{
    font-size:55px;
    font-weight:bold;
    text-shadow:
    0 0 10px #00eaff,
    0 0 30px #00eaff;
}

/* 버튼 */
button{
    background:none;
    border:3px solid #00eaff;
    color:#00eaff;
    padding:25px 70px;
    font-size:30px;
    cursor:pointer;
    box-shadow:
    0 0 20px #00eaff;
}

button:hover{
    background:#00eaff;
    color:#00111f;
}


/* 게임 상태창 */
#game{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.system{
    font-size:50px;
    animation:blink 1s infinite;
    text-shadow:
    0 0 20px cyan;
}

.box{

    margin-top:30px;
    width:600px;
    padding:40px;

    border:3px solid #00eaff;

    background:rgba(0,150,255,.1);

    box-shadow:
    0 0 30px #00eaff,
    inset 0 0 30px #00eaff;

    font-size:25px;

}


@keyframes blink{
    50%{
        opacity:.4;
    }
}

.loading{

    height:20px;
    border:2px solid cyan;
    margin-top:20px;

}

.bar{

    width:0%;
    height:100%;
    background:#00eaff;
    transition:2s;

}

</style>

</head>


<body>


<div id="start">

<div class="text">
작은 것들로부터<br>
과학은 시작된다.
</div>


<button onclick="startGame()">
시작하기
</button>


</div>



<div id="game">

<div class="system">
SYSTEM ONLINE
</div>


<div class="box">

<p>PLAYER : 학생</p>

<p>LEVEL : 중학교 2학년</p>

<hr>

<h2>과학 중2 2단원</h2>


<p>
MISSION : READY
</p>


<p>
EXP : 0 / 100
</p>


<div class="loading">
<div class="bar" id="bar"></div>
</div>


</div>


</div>



<script>

function startGame(){

    // 웅---- 효과음
    let audio = new AudioContext();

    let osc = audio.createOscillator();
    let gain = audio.createGain();


    osc.frequency.value = 80;
    gain.gain.value = 0.15;


    osc.connect(gain);
    gain.connect(audio.destination);


    osc.start();


    osc.frequency.exponentialRampToValueAtTime(
        30,
        audio.currentTime+1.5
    );


    gain.gain.exponentialRampToValueAtTime(
        0.001,
        audio.currentTime+1.5
    );


    osc.stop(audio.currentTime+1.5);



    // 화면 전환

    document.getElementById("start")
    .style.display="none";


    document.getElementById("game")
    .style.display="flex";


    setTimeout(()=>{

        document.getElementById("bar")
        .style.width="100%";

    },300);

}

</script>


</body>
</html>
