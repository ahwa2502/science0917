<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SCIENCE CORE</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
radial-gradient(circle,#06335a,#02040c 55%,#000);

height:100vh;
overflow:hidden;
color:#00eaff;

}


/* 우주 데이터 */

body:before{

content:"";

position:absolute;
inset:0;

background:
radial-gradient(#00eaff 1px,transparent 1px);

background-size:50px 50px;

opacity:.25;

animation:move 20s linear infinite;

}

@keyframes move{

from{transform:translateY(0)}
to{transform:translateY(50px)}

}



/* 시작 */

#start{

height:100vh;

display:flex;

align-items:center;

justify-content:space-between;

padding:0 130px;

position:relative;

z-index:2;

}


.logo{

font-size:42px;

line-height:1.5;

text-shadow:
0 0 15px cyan,
0 0 40px blue;

}



/* 버튼 */

button{

background:none;

border:2px solid #00eaff;

padding:20px 55px;

font-size:28px;

color:#00eaff;

cursor:pointer;

box-shadow:
0 0 20px cyan;

}


button:hover{

background:#00eaff;

color:#001;

}



/* 부팅 */

#boot{

display:none;

height:100vh;

align-items:center;

justify-content:center;

flex-direction:column;

font-size:35px;

text-shadow:0 0 20px cyan;

}



#percent{

font-size:70px;

}



/* 게임 */

#game{

display:none;

height:100vh;

align-items:center;

justify-content:center;

flex-direction:column;

}



.title{

font-size:50px;

animation:flicker 1s infinite;

}



@keyframes flicker{

50%{opacity:.5}

}



.panel{

margin-top:30px;

width:700px;

padding:35px;

border:2px solid cyan;

background:rgba(0,30,60,.7);

box-shadow:

0 0 40px cyan,

inset 0 0 30px cyan;

}



.panel h2{

font-size:35px;

}



.data{

font-size:22px;

line-height:2;

margin-top:20px;

}



.exp{

height:20px;

border:1px solid cyan;

margin:20px 0;

}



.fill{

height:100%;

width:100%;

background:#00eaff;

box-shadow:0 0 20px cyan;

}



.unit{

margin-top:20px;

font-size:23px;

line-height:1.8;

}



.lock{

opacity:.5;

}



</style>

</head>



<body>


<div id="start">

<div class="logo">

우주는 질문하는 자에게<br>
비밀을 공개한다.

</div>


<button onclick="bootSystem()">

START SYSTEM

</button>


</div>




<div id="boot">

<div>
SCIENCE CORE BOOTING...
</div>

<br>

<div id="percent">
0%
</div>

</div>




<div id="game">


<div class="title">

SCIENCE CORE ONLINE

</div>


<div class="panel">


<h2>
PLAYER STATUS
</h2>


<div class="data">

PLAYER : STUDENT<br>

SCIENCE LEVEL : Lv.01<br>

MISSION STATUS : ACTIVE


<div class="exp">

<div class="fill"></div>

</div>


EXP : 100% COMPLETE



<br><br>


CURRENT MISSION<br>

▶ 중학교 2학년 과학 1단원


</div>



<div class="unit">

SCIENCE ARCHIVE<br><br>


✔ 01 물질의 구성<br>

🔒 02 전기와 자기<br>

🔒 03 태양계와 별<br>

🔒 04 화학 반응


</div>


</div>


</div>





<script>


function sound(){

let ctx=new AudioContext();

let osc=ctx.createOscillator();

let gain=ctx.createGain();


osc.type="sawtooth";

osc.frequency.value=100;


gain.gain.value=.15;


osc.connect(gain);

gain.connect(ctx.destination);


osc.frequency.exponentialRampToValueAtTime(
25,
ctx.currentTime+2
);


gain.gain.exponentialRampToValueAtTime(
0.001,
ctx.currentTime+2
);


osc.start();

osc.stop(ctx.currentTime+2);


}



function bootSystem(){


sound();


document.getElementById("start").style.display="none";


document.getElementById("boot").style.display="flex";


let n=0;


let timer=setInterval(()=>{


n+=10;


document.getElementById("percent").innerHTML=n+"%";


if(n>=100){

clearInterval(timer);


setTimeout(()=>{


document.getElementById("boot").style.display="none";


document.getElementById("game").style.display="flex";


},700);


}


},150);


}


</script>


</body>
</html>
