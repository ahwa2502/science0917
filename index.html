<!DOCTYPE html> <html lang="ko"> <head> <meta charset="UTF-8"> <title>Science Mission</title> <style> *{ margin:0; padding:0; box-sizing:border-box; font-family:"Arial", sans-serif; } body{ height:100vh; overflow:hidden; background: linear-gradient(rgba(0,0,40,.55),rgba(0,0,0,.8)), url("background.jpg") center/cover; color:white; } /* 왼쪽 문구 */ .quote{ position:absolute; left:50px; top:40%; font-size:22px; letter-spacing:3px; color:#bdefff; text-shadow:0 0 15px #00cfff; } /* 시작 화면 */ .start-screen{ height:100vh; display:flex; justify-content:center; align-items:center; } button{ background:none; border:2px solid #00eaff; color:#00eaff; font-size:45px; padding:20px 60px; cursor:pointer; text-shadow:0 0 15px #00eaff; box-shadow:0 0 25px #00eaff; transition:.3s; } button:hover{ background:#00eaff; color:#000; } /* 상태창 */ .game{ display:none; height:100vh; justify-content:center; align-items:center; } .panel{ width:450px; padding:35px; border:2px solid #00eaff; background:rgba(0,10,30,.8); box-shadow:0 0 40px #00eaff; } h1{ text-align:center; margin-bottom:25px; color:#00eaff; } .lesson{ padding:12px; margin:10px 0; border:1px solid #555; cursor:pointer; } .lesson:hover{ background:#00eaff; color:black; } .fade{ animation:fade 2s forwards; } @keyframes fade{ from{filter:brightness(1);} to{filter:brightness(0);} } </style> </head> <body> <div class="quote"> 미래는 작은 것에서 시작된다 </div> <div class="start-screen" id="start"> <button onclick="startGame()">START</button> </div> <div class="game" id="game"> <div class="panel"> <h1> SCIENCE DATABASE </h1> <div class="lesson">01. 물질의 구성</div> <div class="lesson">02. 전기와 자기</div> <div class="lesson">03. 태양계와 별</div> <div class="lesson">04. 식물과 에너지</div> <div class="lesson">05. 생물의 다양성</div> </div> </div> <script> function sound(){ const ctx = new AudioContext(); let osc = ctx.createOscillator(); let gain = ctx.createGain(); osc.type="sine"; osc.frequency.value=80; gain.gain.value=0.15; osc.connect(gain); gain.connect(ctx.destination); osc.start(); setTimeout(()=>{ osc.frequency.value=300; },1000); setTimeout(()=>{ gain.gain.exponentialRampToValueAtTime( 0.001, ctx.currentTime+2 ); },2500); } function startGame(){ sound(); document.body.classList.add("fade"); setTimeout(()=>{ document.getElementById("start").style.display="none"; document.querySelector(".quote").style.display="none"; document.body.classList.remove("fade"); document.getElementById("game").style.display="flex"; },2000); } </script> </body> </html>
