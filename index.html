<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SCIENCE CORE</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

height:100vh;
overflow:hidden;

background:
linear-gradient(
135deg,
#02030b,
#00152c,
#000
);

color:#00eaff;

}


/* 네온 도시 느낌 */

body:before{

content:"";

position:absolute;
inset:0;

background:

linear-gradient(
90deg,
transparent 90%,
rgba(0,234,255,.15)
),

linear-gradient(
0deg,
transparent 90%,
rgba(0,234,255,.1)
);

background-size:80px 80px;

opacity:.3;

}


/* 시작 화면 */

#intro{

height:100vh;

display:flex;

align-items:center;

justify-content:center;

flex-direction:column;

position:relative;

}


.title{

font-size:48px;

text-align:center;

line-height:1.5;

text-shadow:
0 0 15px cyan,
0 0 40px blue;

}



/* 연구실 패널 */

.lab{

margin-top:45px;

padding:25px 45px;

border:1px solid #00eaff;

background:rgba(0,40,80,.35);

box-shadow:

0 0 25px cyan,

inset 0 0 20px cyan;

text-align:center;

}


.lab p{

font-size:20px;

line-height:2;

}



button{

margin-top:35px;

padding:18px 55px;

background:transparent;

border:2px solid #00eaff;

color:#00eaff;

font-size:25px;

cursor:pointer;

box-shadow:0 0 20px cyan;

}


button:hover{

background:#00eaff;

color:#001;

}



/* 부팅 */

#boot{

display:none;

height:100vh;

align-items:center;

justify-content:center;

flex-direction:column;

font-size:35px;

}


#percent{

font-size:70px;

margin-top:20px;

}



/* 게임 */

#game{

display:none;

height:100vh;

align-items:center;

justify-content:center;

flex-direction:column;

}


.system{

font-size:45px;

text-shadow:0 0 30px cyan;

animation:blink 1s infinite;

}


@keyframes blink{

50%{opacity:.5;}

}


.panel{

margin-top:35px;

width:700px;

padding:35px;

border:2px solid cyan;

background:rgba(0,30,60,.7);

box-shadow:

0 0 40px cyan,

inset 0 0 30px cyan;

}



.panel h2{

font-size:32px;

}



.data{

margin-top:25px;

font-size:22px;

line-height:2;

}


.progress{

height:18px;

border:1px solid cyan;

margin:20px 0;

}


.fill{

width:100%;

height:100%;

background:#00eaff;

box-shadow:0 0 20px cyan;

}



.units{

margin-top:25px;

line-height:1.8;

font-size:21px;

}


</style>

</head>


<body>


<div id="intro">


<div class="title">

우주는 질문하는 자에게<br>
비밀을 공개한다.

</div>



<div class="lab">

<p>
접속자를 확인했습니다.
</p>

<p>
새로운 탐구자의 여정을 시작하십시오.
</p>

<p>
SCIENCE CORE LAB
</p>

</div>



<button onclick="startSystem()">

START SYSTEM

</button>


</div>





<div id="boot">


<div>
SCIENCE CORE INITIALIZING...
</div>


<div id="percent">
0%
</div>


</div>






<div id="game">


<div class="system">

SCIENCE CORE ONLINE

</div>



<div class="panel">


<h2>
RESEARCHER STATUS
</h2>


<div class="data">


USER : STUDENT<br>

RANK : RESEARCHER Lv.01<br><br>


CURRENT MISSION<br>

중학교 2학년 과학 1학기


<div class="progress">

<div class="fill"></div>

</div>


DATA SYNC : 100%


</div>




<div class="units">

SCIENCE ARCHIVE<br><br>

01 물질의 구성<br>

02 전기와 자기<br>

03 태양계<br>

04 식물과 에너지


</div>


</div>


</div>





<script>


function bootSound(){

let ctx=new AudioContext();

let osc=ctx.createOscillator();

let gain=ctx.createGain();


osc.type="sawtooth";

osc.frequency.value=100;


gain.gain.value=.15;


osc.connect(gain);

gain.connect(ctx.destination);


osc.frequency.exponentialRampToValueAtTime(
30,
ctx.currentTime+2
);


gain.gain.exponentialRampToValueAtTime(
0.001,
ctx.currentTime+2
);


osc.start();

osc.stop(ctx.currentTime+2);

}




function startSystem(){


bootSound();


document.getElementById("intro").style.display="none";


document.getElementById("boot").style.display="flex";


let n=0;


let timer=setInterval(()=>{


n+=10;

document.getElementById("percent").innerHTML=n+"%";


if(n>=100){

clearInterval(timer);


setTimeout(()=>{


document.getElementById("boot").style.display="none";

document.getElementById("game").style.display="flex";


},1000);


}


},300);


}


</script>


</body>
</html>
